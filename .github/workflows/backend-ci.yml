name: Backend CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GDG-Hackathon.sln

      - name: Build
        run: dotnet build GDG-Hackathon.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GDG-Hackathon.sln --configuration Release --no-build
