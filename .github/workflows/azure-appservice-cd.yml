name: Build and Push Containers (Docker Hub)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: taskflow-backend
  FRONTEND_IMAGE_NAME: taskflow-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OPTIONAL: keep Azure login only if you deploy to Azure later in this workflow.
      # If this workflow is ONLY building/pushing images, you can remove this step.
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (Docker Hub)
        run: |
          BACKEND_IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          BACKEND_IMAGE_LATEST="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${BACKEND_IMAGE_NAME}:latest"

          docker build -f Backend/Dockerfile \
            -t "$BACKEND_IMAGE" \
            -t "$BACKEND_IMAGE_LATEST" \
            Backend

          docker push "$BACKEND_IMAGE"
          docker push "$BACKEND_IMAGE_LATEST"

      - name: Build and push frontend image (Docker Hub)
        run: |
          FRONTEND_IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"
          FRONTEND_IMAGE_LATEST="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${FRONTEND_IMAGE_NAME}:latest"

          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.FRONTEND_API_BASE_URL }}" \
            -t "$FRONTEND_IMAGE" \
            -t "$FRONTEND_IMAGE_LATEST" \
            frontend

          docker push "$FRONTEND_IMAGE"
          docker push "$FRONTEND_IMAGE_LATEST"
