name: Build and Push Containers

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_IMAGE_NAME: taskflow-backend
  FRONTEND_IMAGE_NAME: taskflow-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="${ACR_LOGIN_SERVER}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          BACKEND_IMAGE_LATEST="${ACR_LOGIN_SERVER}/${BACKEND_IMAGE_NAME}:latest"

          docker build -f Backend/Dockerfile \
            -t "$BACKEND_IMAGE" \
            -t "$BACKEND_IMAGE_LATEST" \
            Backend

          docker push "$BACKEND_IMAGE"
          docker push "$BACKEND_IMAGE_LATEST"

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE="${ACR_LOGIN_SERVER}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"
          FRONTEND_IMAGE_LATEST="${ACR_LOGIN_SERVER}/${FRONTEND_IMAGE_NAME}:latest"

          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.FRONTEND_API_BASE_URL }}" \
            -t "$FRONTEND_IMAGE" \
            -t "$FRONTEND_IMAGE_LATEST" \
            frontend

          docker push "$FRONTEND_IMAGE"
          docker push "$FRONTEND_IMAGE_LATEST"
